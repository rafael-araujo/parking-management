spring:
  jackson:
    serialization:
      write-bigdecimal-as-plain: true
  datasource:
    url: jdbc:mysql://localhost:3306/parking_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:parking}
    password: ${DB_PASSWORD:parking123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 3003

simulator:
  base-url: http://localhost:3000

logging:
  level:
    com.parking.management: INFO
